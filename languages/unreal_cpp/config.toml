name = "Unreal C++"
grammar = "cpp"
path_suffixes = ["h", "hpp", "cpp", "cc", "cxx"]
first_line_pattern = "^// (Copyright.*Epic|Fill out your copyright notice|Generated by UnrealBuildTool)"
line_comments = ["// "]
block_comment = { start = "/*", end = "*/" }
tab_size = 4
hard_tabs = true

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "<", end = ">", close = false, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
]

autoclose_before = ";:.,=}])> \t\n"
